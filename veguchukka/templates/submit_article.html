{% extends "base.html" %}
{% block title %}వార్త పంపండి — వేగుచుక్క{% endblock %}
{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:800px">
  <div class="bg-white p-4 rounded" style="border:1px solid var(--border)">
    <h4 class="mb-1"><i class="fas fa-pen-nib text-danger"></i> కొత్త వార్త పంపండి</h4>
    <p class="text-muted mb-4" style="font-size:13px">మీరు పంపిన వార్త సంపాదకుని ఆమోదం తర్వాత ప్రచురించబడుతుంది.</p>

    <form method="POST" action="{{ url_for('submit_article') }}" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label fw-bold">వార్త శీర్షిక *</label>
        <input type="text" name="title" class="form-control" placeholder="వార్త శీర్షిక నమోదు చేయండి" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">సారాంశం</label>
        <textarea name="summary" class="form-control" rows="2" placeholder="వార్త సారాంశం (ఐచ్ఛికం)"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">వర్గం *</label>
        <select name="category" class="form-select" required>
          <option value="">— వర్గం ఎంచుకోండి —</option>
          <option>రాజకీయాలు</option>
          <option>అంతర్జాతీయం</option>
          <option>క్రీడలు</option>
          <option>వ్యాపారం</option>
          <option>వినోదం</option>
          <option>సాంకేతికత</option>
          <option>ఆరోగ్యం</option>
          <option>సాధారణం</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">ఫోటో (ఐచ్ఛికం)</label>
        <input type="file" name="image" class="form-control" accept="image/*">
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">వార్త వివరాలు *</label>
        <div id="editor" style="height:250px"></div>
        <input type="hidden" name="content" id="content-input">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger px-4" onclick="saveContent()">
          <i class="fas fa-paper-plane"></i> వార్త పంపండి
        </button>
        <a href="{{ url_for('reporter_dashboard') }}" class="btn btn-outline-secondary">రద్దు చేయండి</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
const quill = new Quill('#editor', { theme: 'snow', placeholder: 'వార్త వివరాలు ఇక్కడ రాయండి...' });
function saveContent() {
  document.getElementById('content-input').value = quill.root.innerHTML;
}
</script>
{% endblock %}
